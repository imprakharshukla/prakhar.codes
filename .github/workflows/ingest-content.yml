name: Ingest Portfolio Content

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/web/src/content/blog/**'
      - 'apps/web/src/content/project/**'
      - 'apps/web/src/content/travel/**'
      - 'apps/web/src/data/experience.ts'
      - 'apps/web/src/components/TestimonialsSection.tsx'
      - 'scripts/ingest-portfolio-content.ts'
  workflow_dispatch: # Allow manual trigger

jobs:
  ingest:
    name: Ingest Content to RAG
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ingestion script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: bun run ingest

      - name: Report status
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Content ingestion successful!"
          else
            echo "❌ Content ingestion failed!"
            exit 1
          fi
